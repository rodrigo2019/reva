{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto card bg-base-100 shadow">
  <div class="card-body">
    <h1 class="card-title">Entrar no REVA</h1>
    <form method="post" class="space-y-3">
      {% csrf_token %}
      <label class="form-control">
        <span class="label-text">Usuário</span>
        <input class="input input-bordered" type="text" name="username" required>
      </label>
      <label class="form-control">
        <span class="label-text">Senha</span>
        <input class="input input-bordered" type="password" name="password" required>
      </label>
      <button class="btn btn-primary w-full" type="submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
